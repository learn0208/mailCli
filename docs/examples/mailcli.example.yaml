# Example mailCli config — copy to ~/.mailcli.yaml and edit.
# Do not commit real passwords to version control.

user_agent: "MyAutomation/1.0"

profiles:
  default:
    protocol: ews
    endpoint: https://mail.example.com/EWS/Exchange.asmx
    user: zhang.san
    auth_type: ntlm
    domain: corp.example.com
    smtp_address: zhang.san@mail.example.com
    display_name: "Zhang San"

  # IMAP examples: see docs/examples/providers/ (qq.yaml, 163.yaml, gmail.yaml, …)
  # Guides: docs/providers/README.md  |  CLI: mailcli providers doc qq

